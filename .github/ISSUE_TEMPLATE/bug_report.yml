name: Bug Report
description: Create a report to help us improve G-man
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: I encountered an error when...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Initialize the client...
        2. Call method X...
        3. See error Y...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true
  - type: input
    id: go_version
    attributes:
      label: Go Version
      description: Run `go version` and paste the output.
      placeholder: e.g., go version go1.25.4 windows/amd64
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please provide logs using the structured logging (pkg/log).
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
